<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <rect width="680" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="340" y="35" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="18" font-weight="bold">青教赛演练工具 — 八大功能架构</text>
  <text x="340" y="55" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">Eight Core Functions Architecture</text>

  <!-- Center node -->
  <rect x="240" y="230" width="200" height="60" fill="url(#centerGrad)" rx="30" stroke="#e94560" stroke-width="2"/>
  <text x="340" y="258" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">全国高校青年教师</text>
  <text x="340" y="276" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">教学竞赛演练</text>

  <!-- 8 function nodes around center -->
  <!-- Top row -->
  <rect x="40" y="90" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="110" y="112" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能一</text>
  <text x="110" y="130" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">教学设计评审与优化</text>

  <rect x="270" y="90" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="340" y="112" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能二</text>
  <text x="340" y="130" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">课堂教学模拟评审</text>

  <rect x="500" y="90" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="570" y="112" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能三</text>
  <text x="570" y="130" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">教学反思撰写辅导</text>

  <!-- Middle row sides -->
  <rect x="20" y="230" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="90" y="252" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能四</text>
  <text x="90" y="270" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">PPT设计与内容评审</text>

  <rect x="520" y="230" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="590" y="252" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能五</text>
  <text x="590" y="270" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">授课音频全方位分析</text>

  <!-- Bottom row -->
  <rect x="40" y="370" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="110" y="392" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能六</text>
  <text x="110" y="410" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">五大学科组别适配</text>

  <rect x="270" y="370" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="340" y="392" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能七</text>
  <text x="340" y="410" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">竞赛层级动态匹配</text>

  <rect x="500" y="370" width="140" height="55" fill="#0f3460" rx="8" stroke="#533483" stroke-width="1.5"/>
  <text x="570" y="392" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="11" font-weight="bold">功能八</text>
  <text x="570" y="410" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10">综合备赛诊断报告</text>

  <!-- Connection lines -->
  <line x1="180" y1="120" x2="280" y2="230" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="340" y1="145" x2="340" y2="230" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="500" y1="120" x2="400" y2="230" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="160" y1="258" x2="240" y2="258" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="520" y1="258" x2="440" y2="258" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="180" y1="395" x2="280" y2="290" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="340" y1="370" x2="340" y2="290" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="500" y1="395" x2="400" y2="290" stroke="#533483" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Bottom labels -->
  <text x="110" y="455" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">文科·理科·工科·医科·思政</text>
  <text x="340" y="455" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">校赛→省赛→国赛</text>
  <text x="570" y="455" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">全流程·综合诊断</text>

  <!-- Five tracks indicator -->
  <rect x="40" y="475" width="600" height="30" fill="#0f3460" rx="6" opacity="0.5"/>
  <text x="340" y="494" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">三大环节：教学设计(20%) + 课堂教学(75%) + 教学反思(5%) = 100分</text>
</svg>
